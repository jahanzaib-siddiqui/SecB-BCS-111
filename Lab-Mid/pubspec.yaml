name: task_manager_app
description: "Task Management Application using Flutter & SQLite"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔹 Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # 🔹 State Management
  provider: ^6.0.5

  # 🔹 Date Formatting
  intl: ^0.18.1

  # 🔹 Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  flutter_timezone: ^1.0.8

  # 🔹 Export Features
  csv: ^5.0.0
  pdf: ^3.10.0
  path_provider: ^2.0.15

  # 🔹 Share / Email
  share_plus: ^10.0.2

  # 🔹 Persistence (dark mode etc)
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true