name: quiz1
description: "Simple Dice App - Assignment 3"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Registering Dice Images
  assets:
    - assets/images/

  # Optional: If you want to use Poppins font
